<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <main class="container">
    <section class="panel">
      <a class="back" href="/">← Volver</a>

      <h1>Usuarios</h1>
      <p class="route">GET /api/v1/usuarios</p>

      <div class="toolbar">
        <input type="text" id="filtroUsuario" placeholder="Buscar por nombre...">
        <button onclick="filtrarUsuarios()">Filtrar</button>
      </div>

      <div id="mensaje"></div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
            </tr>
          </thead>
          <tbody id="tablaUsuarios"></tbody>
        </table>
      </div>

      <div class="detail-box">
        <input type="number" id="usuarioId" placeholder="ID para detalle">
        <button onclick="detalleUsuario()">Ver detalle (/id)</button>
      </div>

      <pre id="detalle"></pre>
    </section>
  </main>

  <script src="/js/script.js"></script>
</body>
</html>
